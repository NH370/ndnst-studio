<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - NĐNST-STUDIO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-container">
<h2>ADMIN QUẢN LÝ WEBSITE</h2>

<input type="file" id="logoInput">
<input type="file" id="bgInput">

<input type="text" id="sloganInput" placeholder="Nhập slogan">
<textarea id="introInput" placeholder="Nhập giới thiệu"></textarea>

<input type="file" id="introImagesInput" multiple>
<button onclick="addIntroImages()">Thêm ảnh giới thiệu</button>

<h3>Thêm Album</h3>
<input type="text" id="albumName" placeholder="Tên album">
<input type="text" id="albumLink" placeholder="Link Google Drive">
<input type="file" id="albumCover">
<button onclick="addAlbum()">Thêm Album</button>

<h3>Link Facebook Messenger</h3>
<input type="text" id="facebookInput" placeholder="Link Messenger">

<h3>Xuất bản GitHub Pages</h3>
<input type="text" id="githubUser" placeholder="Nhập username GitHub">
<input type="text" id="domainName" placeholder="Tên miền phía sau (vd: ndnst-studio)">

<button onclick="saveData()">LƯU WEBSITE</button>
</div>

<script>
let studioData = {
    logo:"",
    background:"",
    slogan:"",
    intro:"",
    introImages:[],
    albums:[],
    facebook:""
};

function getBase64(file, callback){
    const reader = new FileReader();
    reader.onload = ()=> callback(reader.result);
    reader.readAsDataURL(file);
}

document.getElementById("logoInput").onchange = e=>{
    getBase64(e.target.files[0], result=>{
        studioData.logo=result;
    });
}

document.getElementById("bgInput").onchange = e=>{
    getBase64(e.target.files[0], result=>{
        studioData.background=result;
    });
}

function addIntroImages(){
    const files = document.getElementById("introImagesInput").files;
    for(let file of files){
        getBase64(file, result=>{
            studioData.introImages.push(result);
        });
    }
    alert("Đã thêm ảnh giới thiệu!");
}

function addAlbum(){
    const name=document.getElementById("albumName").value;
    const link=document.getElementById("albumLink").value;
    const file=document.getElementById("albumCover").files[0];

    getBase64(file, result=>{
        studioData.albums.push({
            name:name,
            link:link,
            cover:result
        });
        alert("Đã thêm album!");
    });
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

function saveData(){
    studioData.slogan=document.getElementById("sloganInput").value;
    studioData.intro=document.getElementById("introInput").value;
    studioData.facebook=document.getElementById("facebookInput").value;

    set(ref(database, "studioData"), studioData);
    alert("Đã lưu ONLINE thành công!");
}
</script>

<footer>
    <div class="footer-content">
        <img id="adminCopyrightLogo" class="copyright-logo">
        <p>© 2026 NĐNST-STUDIO | By Đ.Nhật</p>
    </div>
</footer>

<script>
const saved = JSON.parse(localStorage.getItem("studioData"));
if(saved){
    document.getElementById("adminCopyrightLogo").src = saved.logo;
}
</script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC8CC9chIzKyeun8IUdDlHljg1pT8l51Uo",
  authDomain: "ndnst-studio.firebaseapp.com",
  databaseURL: "https://ndnst-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ndnst-studio",
  storageBucket: "ndnst-studio.firebasestorage.app",
  messagingSenderId: "432107614469",
  appId: "1:432107614469:web:35c98284776c08e0ed076c"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const dbRef = ref(database, "studioData");

onValue(dbRef, (snapshot) => {
  const data = snapshot.val();
  if(data){
    document.getElementById("logo").src = data.logo;
    document.getElementById("header").style.backgroundImage = `url(${data.background})`;
    document.getElementById("slogan").innerText = data.slogan;
    document.getElementById("introText").innerText = data.intro;
    document.getElementById("facebookLink").href = data.facebook;

    const introGallery = document.getElementById("introGallery");
    introGallery.innerHTML="";
    data.introImages.forEach(img=>{
      let image=document.createElement("img");
      image.src=img;
      introGallery.appendChild(image);
    });

    const albumList=document.getElementById("albumList");
    albumList.innerHTML="";
    data.albums.forEach(album=>{
      let card=document.createElement("div");
      card.className="album-card";
      card.innerHTML=`<img src="${album.cover}"><h3>${album.name}</h3>`;
      card.onclick=()=>window.open(album.link,"_blank");
      albumList.appendChild(card);
    });
  }
});
</script>

</body>

</html>

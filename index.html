<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>NĐNST-STUDIO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="header">
  <div class="content">
    <img id="logo" class="logo">
    <h1>NĐNST-STUDIO</h1>
    <p class="slogan" id="slogan"></p>
    <p class="by">By Đ.Nhật</p>
  </div>
</header>

<section>
  <h2 class="section-title">Giới thiệu</h2>
  <p id="introText"></p>
  <div class="intro-gallery" id="introGallery"></div>
</section>

<section>
  <h2 class="section-title">Album</h2>
  <div class="album-grid" id="albumList"></div>
</section>

<section class="contact">
  <h2 class="section-title">Liên hệ</h2>
  <a id="facebookLink" target="_blank">Chat Facebook</a>
</section>

<footer>
    <div class="footer-content">
        <p>© 2026 NĐNST-STUDIO | All Rights Reserved | By Đ.Nhật</p>
    </div>
</footer>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* 🔥 DÁN CONFIG CỦA BẠN VÀO ĐÂY */
const firebaseConfig = {
  apiKey: "AIzaSyC8CC9chIzKyeun8IUdDlHljg1pT8l51Uo",
  authDomain: "ndnst-studio.firebaseapp.com",
  databaseURL: "https://ndnst-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ndnst-studio",
  storageBucket: "ndnst-studio.firebasestorage.app",
  messagingSenderId: "432107614469",
  appId: "1:432107614469:web:35c98284776c08e0ed076c"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

onValue(ref(database,"studioData"), snapshot=>{
  const data=snapshot.val();
  if(!data) return;

  logo.src=data.logo||"";
  header.style.backgroundImage=`url(${data.background||""})`;
  slogan.innerText=data.slogan||"";
  introText.innerText=data.intro||"";
  facebookLink.href=data.facebook||"#";

  introGallery.innerHTML="";
  (data.introImages||[]).forEach(img=>{
    const i=document.createElement("img");
    i.src=img;
    introGallery.appendChild(i);
  });

  albumList.innerHTML="";
  (data.albums||[]).forEach(album=>{
    const card=document.createElement("div");
    card.className="album-card";
    card.innerHTML=`<img src="${album.cover}"><h3>${album.name}</h3>`;
    card.onclick=()=>window.open(album.link,"_blank");
    albumList.appendChild(card);
  });
});
</script>

</body>
</html>

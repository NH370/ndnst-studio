<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>NĐNST-STUDIO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="header">
    <div class="content">
        <img id="logo" class="logo">
        <h1>NĐNST-STUDIO</h1>
        <p class="slogan" id="slogan"></p>
        <p class="by">By Đ.Nhật</p>
    </div>
</header>

<section>
    <h2 class="section-title">Giới thiệu</h2>
    <p id="introText"></p>
    <div class="intro-gallery" id="introGallery"></div>
</section>

<section>
    <h2 class="section-title">Album</h2>
    <div class="album-grid" id="albumList"></div>
</section>

<section class="contact">
    <h2 class="section-title">Liên hệ</h2>
    <a id="facebookLink" target="_blank">Chat qua Facebook</a>
</section>

<footer>
    <div class="footer-content">
        <p>© 2026 NĐNST-STUDIO | By Đ.Nhật</p>
    </div>
</footer>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* 🔥 DÁN CONFIG CỦA BẠN VÀO ĐÂY */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const dbRef = ref(database, "studioData");

onValue(dbRef, (snapshot) => {
  const data = snapshot.val();
  if(data){

    document.getElementById("logo").src = data.logo;
    document.getElementById("header").style.backgroundImage = `url(${data.background})`;
    document.getElementById("slogan").innerText = data.slogan;
    document.getElementById("introText").innerText = data.intro;
    document.getElementById("facebookLink").href = data.facebook;

    const introGallery = document.getElementById("introGallery");
    introGallery.innerHTML="";
    if(data.introImages){
      data.introImages.forEach(img=>{
        let image=document.createElement("img");
        image.src=img;
        introGallery.appendChild(image);
      });
    }

    const albumList=document.getElementById("albumList");
    albumList.innerHTML="";
    if(data.albums){
      data.albums.forEach(album=>{
        let card=document.createElement("div");
        card.className="album-card";
        card.innerHTML=`<img src="${album.cover}"><h3>${album.name}</h3>`;
        card.onclick=()=>window.open(album.link,"_blank");
        albumList.appendChild(card);
      });
    }
  }
});
</script>

</body>
</html>
